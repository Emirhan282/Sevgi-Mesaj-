<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sorum Var!</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #card {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            text-align: center;
            max-width: 400px;
            border: 1px solid #ff69b4;
        }

        h2 { color: #ff69b4; min-height: 60px; }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        #yesBtn { background-color: #ff69b4; color: white; }
        #noBtn { background-color: #444; color: #bbb; position: absolute; left: 220px; }

        #finalMessage { display: none; font-size: 50px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="card">
    <div id="content">
        <h2 id="question">Sana çok önemli bir sorum var.Hazır mısın?</h2>
        <div class="buttons">
            <button id="yesBtn">Evet</button>
            <button id="noBtn">Hayır</button>
        </div>
    </div>
    <div id="finalMessage">❤️Bende seni çok seviyorum bunu hiç bir zaman unutma YEŞİL GÖZLÜM Geçmiş Doğum Günün Tekrardan Kutlu Olsunn❤️</div>
</div>

<script>
    const questionText = document.getElementById('question');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const finalMessage = document.getElementById('finalMessage');
    const content = document.getElementById('content');

    let step = 0;
    const messages = [
        "Dünyanın en şanslı insanı kim biliyor musun?",
        "Seninle tanıştığım gün dünyanın en şanslı insanı ben oldum seni iyiki tanımışım prensesim.",
        "Beni seviyor musun?"
    ];

    // Evet butonuna basınca olacaklar
    yesBtn.addEventListener('click', () => {
        if (step < messages.length) {
            questionText.innerText = messages[step];
            step++;
        } else {
            content.style.display = 'none';
            finalMessage.style.display = 'block';
            startConfetti();
        }
    });

    // Kaçan buton mekanizması (Hayır butonuna yaklaştıkça kaçar)
    noBtn.addEventListener('mouseover', () => {
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
        
        noBtn.style.position = 'fixed';
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    });

    // Konfeti efekti (Basit)
    function startConfetti() {
        setInterval(() => {
            const leaf = document.createElement('div');
            leaf.innerHTML = '🌸';
            leaf.style.position = 'fixed';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.top = '-20px';
            leaf.style.fontSize = '24px';
            leaf.style.animation = `fall ${Math.random() * 3 + 2}s linear`;
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 3000);
        }, 100);
    }
</script>

<style>
    @keyframes fall {
        to { transform: translateY(110vh) rotate(360deg); }
    }
</style>

</body>

</html>
